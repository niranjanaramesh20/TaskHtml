<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flex-boxes</title>
    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            }
        .box{
            display: flex;
            background-color: pink;
            padding: 20px;
            flex-direction: column;
            gap: 20px;
            width: 500px;
        }
        .header{
            background-color: lightblue;
            padding: 20px;
            text-align: center;
        }
        .middle{
            display: flex;
            gap: 20px;
            justify-content: space-between;
        }
        .aside{
            background-color: lightblue;
            padding: 20px;
        }
        .right {
            background-color: rgb(245, 77, 130);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .article{
            padding: 20px;
            text-align: center;
        }
        .img {
            display: flex;
            padding: 20px;
            gap: 20px;
            flex-direction: row;
        }
        .image{
            background-color: lightblue;
            padding: 20px;
        }
        .footer{
            background-color: lightblue;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="header">Header</div>
        <div class="middle">
            <div class="aside">Aside</div>
            <div class="right"> 
                <div class="article">Article</div>
                <div class="img">
                    <div class="image">image</div>
                    <div class="image">image</div>
                    <div class="image">image</div>
                </div>
            </div>
        </div>
        <div class="footer">Footer</div>
    </div>
</body>
</html>
